# @purpose vhost nginx per stat.florenceegi.com (EGI-STAT — dashboard interna + API pubblica minima).
# @author Padmin D. Curtis (AI Partner OS3.0) for Fabio Cherici
# @version 1.0.0 (EGI-STAT) — M-266
# Pattern: TLS terminato all'ALB → vhost HTTP (listen 80), come tmp-le-vespe (M-LEVESPE-020).
# TUTTO dietro basic auth (dashboard React + API interne) TRANNE:
#   - /api/public/  → aggregato minimo per fabiocherici.com (CORS dal Flask, rate-limit qui)
#   - /health       → ALB target check
# Backend Flask via gunicorn su 127.0.0.1:5055 (systemd: egi-stat).

limit_req_zone $binary_remote_addr zone=statpub:10m rate=10r/m;

server {
    listen 80;
    server_name stat.florenceegi.com;
    root /home/forge/stat.florenceegi.com/frontend/dist;
    index index.html;
    absolute_redirect off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # strumento interno: mai indicizzato
    add_header X-Robots-Tag "noindex, nofollow" always;

    auth_basic "EGI-STAT - area riservata";
    auth_basic_user_file /etc/nginx/.htpasswd-egistat;

    location = /health { auth_basic off; return 200 'OK'; add_header Content-Type text/plain; }

    # Aggregato pubblico per fabiocherici.com — NO auth, rate-limit 10 req/min per IP
    # (il widget fa 1 fetch per pageview; cache 60s lato Flask + CDN browser).
    location /api/public/ {
        auth_basic off;
        limit_req zone=statpub burst=20 nodelay;
        proxy_pass http://127.0.0.1:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API interne (dashboard) — dietro basic auth ereditata dal server block
    location /api/ {
        proxy_pass http://127.0.0.1:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA React
    location / { try_files $uri $uri/ /index.html; }
}
